<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service NSW Registration</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app" class="hidden">
        <div class="tablet-shell">
            <div class="tablet">
                <div class="tablet__header">
                    <div class="header-left">
                        <div class="nsw-logo">Service <span>NSW</span></div>
                        <div class="title">Vehicle Registration</div>
                    </div>
                    <div class="subtitle" id="subtitle">Service Centre</div>
                </div>
                <div class="tablet__content">
                    <div class="actions">
                        <button data-action="home" class="active">Home</button>
                        <button data-action="register">Register Vehicle</button>
                        <button data-action="renew">Renew Registration</button>
                        <button data-action="transfer">Transfer Ownership</button>
                        <button data-action="lookup">Plate Lookup</button>
                        <button data-action="history">History</button>
                        <button data-action="print">Print Plate</button>
                        <button data-action="mechanic" id="mechanic-btn" class="hidden">Mechanic Portal</button>
                        <button data-action="close" class="secondary">Log Out</button>
                    </div>
                    <div class="panel" id="panel">
                        <!-- Content will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
